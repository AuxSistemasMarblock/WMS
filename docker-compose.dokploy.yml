services:
  wms-backend:
    build: ./backend
    container_name: wms-backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3001
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - NETSUITE_ACCOUNT_ID=${NETSUITE_ACCOUNT_ID}
      - NETSUITE_REALM=${NETSUITE_REALM}
      - NETSUITE_ENVIRONMENT=${NETSUITE_ENVIRONMENT}
      - NETSUITE_API_VERSION=${NETSUITE_API_VERSION}
      - NETSUITE_CLIENT_ID=${NETSUITE_CLIENT_ID}
      - NETSUITE_CLIENT_SECRET=${NETSUITE_CLIENT_SECRET}
      - NETSUITE_TOKEN_ID=${NETSUITE_TOKEN_ID}
      - NETSUITE_TOKEN_SECRET=${NETSUITE_TOKEN_SECRET}
      - NETSUITE_RESTLET_URL=${NETSUITE_RESTLET_URL}
      - NETSUITE_RESTLET_SCRIPT_ID=${NETSUITE_RESTLET_SCRIPT_ID}
      - NETSUITE_RESTLET_DEPLOY_ID=${NETSUITE_RESTLET_DEPLOY_ID}
      - NETSUITE_FOLDER_AUXALMACEN=${NETSUITE_FOLDER_AUXALMACEN}
      - NETSUITE_FOLDER_CLIENTE=${NETSUITE_FOLDER_CLIENTE}
      - NETSUITE_FOLDER_JEFE=${NETSUITE_FOLDER_JEFE}
      - NETSUITE_FOLDER_GERENTE=${NETSUITE_FOLDER_GERENTE}
      - NETSUITE_FILECABINET_PATH_PREFIX=${NETSUITE_FILECABINET_PATH_PREFIX}
      - NETSUITE_FILECABINET_SIGNATURE_FOLDER_PATTERN=${NETSUITE_FILECABINET_SIGNATURE_FOLDER_PATTERN}
      - NETSUITE_FILECABINET_FILE_PATTERN=${NETSUITE_FILECABINET_FILE_PATTERN}
      - NETSUITE_SEARCH_RESTLET_URL=${NETSUITE_SEARCH_RESTLET_URL}
      - NETSUITE_SEARCH_RESTLET_SCRIPT_ID=${NETSUITE_SEARCH_RESTLET_SCRIPT_ID}
      - NETSUITE_SEARCH_RESTLET_DEPLOY_ID=${NETSUITE_SEARCH_RESTLET_DEPLOY_ID}
      - NETSUITE_SEARCH_ID=${NETSUITE_SEARCH_ID}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - LOG_LEVEL=${LOG_LEVEL}
    ports:
      - "3001:3001"

  wms-frontend:
    build: .
    container_name: wms-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - wms-backend
