services:
  wms-backend:
    build: ./backend
    container_name: wms-backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - NETSUITE_ACCOUNT_ID=${NETSUITE_ACCOUNT_ID}
      - NETSUITE_CLIENT_ID=${NETSUITE_CLIENT_ID}
      - NETSUITE_CLIENT_SECRET=${NETSUITE_CLIENT_SECRET}
    depends_on:
      - wms-scanner

  wms-scanner:
    build: .
    container_name: scanner-app
    restart: always
    ports:
      - "80"
    environment:
      - BACKEND_URL=http://wms-backend:3001
    depends_on:
      - wms-backend