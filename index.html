<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WMS · Scanner de Salidas</title>

  <!-- Bibliotecas externas -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <!-- Fuentes -->
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Estilos -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<header>
  <div class="logo">
    <img src="images/logo.png" alt="Logo Empresa" style="height:30px; width:auto; border-radius:6px; padding:2px;"/>
    <!-- <div class="logo-icon"> ...SVG... </div> -->
    WMS · SCANNER
  </div>
  <span class="badge">SALIDAS v2.0</span>
</header>

<main>

  <!-- FOLIO BAR -->
  <div class="folio-bar">
    <label>Folio SO</label>
    <div class="folio-input-wrap">
      <input id="folioInput" type="text" placeholder="Escanea QR de IF" />
      <svg class="folio-qr-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
      </svg>
    </div>
    <div class="folio-badge" id="folioBadge">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      <span id="folioBadgeText">–</span>
      <button onclick="clearFolio()" title="Limpiar">✕</button>
    </div>
    <label>Responsable</label>
    <div class="folio-input-wrap">
      <input id="respInput" type="text" placeholder="Nombre completo" />
    </div>
  </div>

  <!-- MODO TOGGLE -->
  <div class="mode-toggle">
    <button class="mode-btn active-placa" id="btnModeplaca" onclick="setMode('placa')">
      📦 Escanear placa
    </button>
    <button class="mode-btn" id="btnModeFolio" onclick="setMode('folio')">
      📋 Capturar Folio &nbsp;·&nbsp; QR de IF
    </button>
  </div>

  <!-- SCANNER -->
  <div class="scanner-card">
    <h2 id="scanCardTitle">Escáner QR — Modo: placas</h2>
    <div class="scan-area" id="scanArea">
      <div id="reader"></div>
      <div class="scan-overlay" id="scanOverlay" style="display:none;">
        <div class="mode-label" id="modeLabel">MODO: placa</div>
        <div class="scan-frame"><span></span><div class="scan-line"></div></div>
        <p class="scan-hint" id="scanHint">Apunta al QR de la placa</p>
      </div>
      <div class="scan-idle" id="scanIdle">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
        </svg>
        Cámara inactiva — presiona <strong style="color:var(--accent);margin:0 4px;">Capturar QR</strong> para iniciar
      </div>
    </div>
    <div class="status-line">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Listo para escanear</span>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btnStart" onclick="startScanner()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
        Capturar QR
      </button>
      <button class="btn btn-stop" id="btnStop" onclick="stopScanner()" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
        Detener
      </button>
    </div>
  </div>



  <!-- TABLA -->
  <div class="table-card">
    <div class="table-header">
      <div class="table-title">
        Registros capturados
        <span class="count-badge" id="rowCount">0</span>
      </div>
      <div class="table-actions">
        <button class="btn btn-primary" id="btnCompletar" onclick="completarRegistro()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="20 6 9 17 4 12"/></svg>
          Completar registro
        </button>
        <button class="btn btn-ghost" onclick="clearTable()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          Limpiar
        </button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th><th>SKU</th><th>Lote</th><th>Ubicación</th><th>Hora</th><th></th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr id="emptyRow"><td colspan="6">
            <div class="empty-state">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/>
              </svg>
              Sin registros. Escanea un QR de placa para comenzar.
            </div>
          </td></tr>
        </tbody>
      </table>
    </div>
    <!-- jsonPreview eliminado para producción -->
  </div>

<div id="toast"></div>

<!-- Scripts modulares -->
<script src="js/utils.js"></script>
<script src="js/qr-parser.js"></script>
<script src="js/webhook.js"></script>
<script src="js/table.js"></script>
<script src="js/scanner.js"></script>
<script src="js/app.js"></script>
</body>
</html>
</body>
</html>
